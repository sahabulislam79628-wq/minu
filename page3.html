<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You ❤️</title>

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffe6ee,#fff5f8);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:700px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:left;
    position:relative;
    z-index:10;
}

h1{
    text-align:center;
    color:#ff4d88;
}

#letter{
    font-size:18px;
    line-height:1.8;
    color:#444;
    white-space:pre-line;
}

button{
    display:block;
    margin:30px auto 0;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:#ff8fb1;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.heart{
    position:fixed;
    top:-50px;
    animation:fall 6s linear forwards;
    pointer-events:none;
}

@keyframes fall{
    from{
        transform:translateY(-50px);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>💌 A Letter For You</h1>

    <div id="letter"></div>

    <button onclick="location.href='page4.html'">
        Final Surprise 🎁
    </button>
</div>

<script>
const message = `Dear Minu,

I made this little website because I wanted to remind you how much your friendship means to me.

Thank you for all the laughs, the random conversations, the support, and the memories we've shared.

Some people come into our lives and leave a positive mark without even realizing it. You're one of those people.

No matter how busy life gets or where the future takes us, I'll always be grateful for our friendship.

Thank you for being yourself.
Thank you for being my friend.

❤️`;

let i = 0;
const speed = 40;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("letter").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

window.onload = function() {
    typeWriter();
};

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 15 + 15) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>
